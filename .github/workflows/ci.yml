name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — TUnit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/BdoWeather.Tests

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test with coverage
        run: dotnet run --no-build --configuration Release -- --coverage --coverage-output-format cobertura

      - name: Upload BE coverage
        uses: actions/upload-artifact@v4
        with:
          name: be-coverage
          path: src/BdoWeather.Tests/bin/Release/net10.0/TestResults/*.cobertura.xml

  frontend:
    name: Frontend — vitest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/bdo-weather-ui

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: src/bdo-weather-ui/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Test with coverage
        run: npm run test:coverage

      - name: Upload FE coverage
        uses: actions/upload-artifact@v4
        with:
          name: fe-coverage
          path: src/bdo-weather-ui/coverage/
